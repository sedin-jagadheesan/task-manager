<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>

  <div class="container">

   
    <div id="homePage">
      <h1>Task Manager</h1>
      <p> Welcome To Your Task Manager </p>
      <button id="goToTask">Create Task</button>
    </div>

   
    <div id="taskPage" style="display: none;">
      <h2>Create Your Task</h2>

      <form id="taskForm">
        <input type="text" id="title" placeholder="Task Title" />
        <small id="error"></small>

        <select id="priority">
          <option value="Medium">Medium</option>
          <option value="High">High</option>
          <option value="Low">Low</option>
        </select>

        <textarea id="description" placeholder="Description"></textarea>

        <button id="submitBtn" disabled>Save Task</button>
      </form>

      <h3>Your Tasks</h3>
      <ul id="taskList" style="padding-inline-start: 0em;"></ul>

      <button id="backHome">⬅ Back</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
